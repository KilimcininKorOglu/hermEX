name: hermex

# Single compose file for hermEX. The whole project is in active development, so
# there is ONE environment and ONE MariaDB (db), no profiles: the Go toolchain
# (dev) and the runnable mail server (mta/pop3/imap/webmail) all come up together
# with `docker compose up -d`. Tests use a SEPARATE database (hermex_test) on the
# same db container — created on demand by the test harness — so the suite never
# disturbs the runtime accounts in the 'email' database. Every persistent volume
# is a docker-data/ bind mount; there are no Docker named volumes.
services:
  db:
    container_name: hermex-db
    image: mariadb:11
    environment:
      - MARIADB_ROOT_PASSWORD=hermexstack
      - MARIADB_DATABASE=email
    volumes:
      - ./docker-data/db:/var/lib/mysql
    ports:
      - "8142:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # Central log store (Slice N). Internal-only: the daemons and the test harness
  # reach it as mongo:27017 on the compose network, so no host port is exposed
  # (the admin panel, not direct access, is how logs are inspected).
  mongo:
    container_name: hermex-mongo
    image: mongo:7
    volumes:
      - ./docker-data/mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  dev:
    container_name: hermex-dev
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    working_dir: /src
    volumes:
      - .:/src
      - ./docker-data/cache/go-build:/root/.cache/go-build
      - ./docker-data/cache/go-mod:/go/pkg/mod
      - ./docker-data:/data
    environment:
      - HERMEX_DATA_DIR=/data
      - HERMEX_TEST_MYSQL_DSN=root:hermexstack@tcp(db:3306)/hermex_test?charset=utf8mb4
      - HERMEX_TEST_MONGO_URI=mongodb://mongo:27017
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
    command: sleep infinity

  mta:
    container_name: hermex-mta
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["/usr/local/bin/hermex-mta", "-config", "/config/config.json"]
    volumes:
      - ./docker-data/mailboxes:/data/mailboxes
      - ./docker-data/config.json:/config/config.json:ro
      # Persist the log spill across container recreate so an outage+restart loses
      # no buffered events (a fresh sink replays a leftover logspill.jsonl). A
      # per-daemon subdir is required: each daemon writes its own logspill.jsonl, so
      # a shared dir would race on concurrent append and replay-delete.
      - ./docker-data/spill/mta:/data/logspill
    ports:
      - "8140:25"
    depends_on:
      db:
        condition: service_healthy
      # No dependency on mongo: the log sink self-heals (spills to disk and
      # reconnects), so mail must start and serve even if the log store is absent.
    restart: unless-stopped

  pop3:
    container_name: hermex-pop3
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["/usr/local/bin/hermex-pop3", "-config", "/config/config.json"]
    volumes:
      - ./docker-data/mailboxes:/data/mailboxes
      - ./docker-data/config.json:/config/config.json:ro
      - ./docker-data/spill/pop3:/data/logspill
    ports:
      - "8141:110"
    depends_on:
      db:
        condition: service_healthy
      # No dependency on mongo: the log sink self-heals (spills to disk and
      # reconnects), so mail must start and serve even if the log store is absent.
    restart: unless-stopped

  imap:
    container_name: hermex-imap
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["/usr/local/bin/hermex-imap", "-config", "/config/config.json"]
    volumes:
      - ./docker-data/mailboxes:/data/mailboxes
      - ./docker-data/config.json:/config/config.json:ro
      - ./docker-data/spill/imap:/data/logspill
    ports:
      - "8143:143"
    depends_on:
      db:
        condition: service_healthy
      # No dependency on mongo: the log sink self-heals (spills to disk and
      # reconnects), so mail must start and serve even if the log store is absent.
    restart: unless-stopped

  webmail:
    container_name: hermex-webmail
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["/usr/local/bin/hermex-webmail", "-config", "/config/config.json"]
    volumes:
      - ./docker-data/mailboxes:/data/mailboxes
      - ./docker-data/config.json:/config/config.json:ro
      - ./docker-data/spill/webmail:/data/logspill
    ports:
      - "8144:8080"
    depends_on:
      db:
        condition: service_healthy
      # No dependency on mongo: the log sink self-heals (spills to disk and
      # reconnects), so mail must start and serve even if the log store is absent.
    restart: unless-stopped

  dav:
    container_name: hermex-dav
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["/usr/local/bin/hermex-dav", "-config", "/config/config.json"]
    volumes:
      - ./docker-data/mailboxes:/data/mailboxes
      - ./docker-data/config.json:/config/config.json:ro
      - ./docker-data/spill/dav:/data/logspill
    ports:
      - "8145:8080"
    depends_on:
      db:
        condition: service_healthy
      # No dependency on mongo: the log sink self-heals (spills to disk and
      # reconnects), so mail must start and serve even if the log store is absent.
    restart: unless-stopped

  activesync:
    container_name: hermex-activesync
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["/usr/local/bin/hermex-activesync", "-config", "/config/config.json"]
    volumes:
      - ./docker-data/mailboxes:/data/mailboxes
      - ./docker-data/config.json:/config/config.json:ro
      - ./docker-data/spill/activesync:/data/logspill
    ports:
      - "8146:8080"
    depends_on:
      db:
        condition: service_healthy
      # No dependency on mongo: the log sink self-heals (spills to disk and
      # reconnects), so mail must start and serve even if the log store is absent.
    restart: unless-stopped

  ews:
    container_name: hermex-ews
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["/usr/local/bin/hermex-ews", "-config", "/config/config.json"]
    volumes:
      - ./docker-data/mailboxes:/data/mailboxes
      - ./docker-data/config.json:/config/config.json:ro
      - ./docker-data/spill/ews:/data/logspill
    ports:
      - "8147:8080"
    depends_on:
      db:
        condition: service_healthy
      # No dependency on mongo: the log sink self-heals (spills to disk and
      # reconnects), so mail must start and serve even if the log store is absent.
    restart: unless-stopped

  mapi:
    container_name: hermex-mapi
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["/usr/local/bin/hermex-mapi", "-config", "/config/config.json"]
    volumes:
      - ./docker-data/mailboxes:/data/mailboxes
      - ./docker-data/config.json:/config/config.json:ro
      - ./docker-data/spill/mapi:/data/logspill
    ports:
      - "8148:8080"
    depends_on:
      db:
        condition: service_healthy
      # No dependency on mongo: the log sink self-heals (spills to disk and
      # reconnects), so mail must start and serve even if the log store is absent.
    restart: unless-stopped

  # Single-FQDN front door: reverse-proxies to the HTTP daemons by path prefix so
  # one host serves autodiscover/EWS/MAPI/RPC/ActiveSync/DAV/webmail. Reads the
  # shared config.json (DSN, TLS cert, logging) like the other daemons; its DB
  # connection serves only the TLS certificate store. Terminates TLS with the
  # config's tls_cert (the same dev cert as the mail daemons) and forwards to the
  # backends over TLS, skipping verification on the internal hop.
  gateway:
    container_name: hermex-gateway
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["/usr/local/bin/hermex-gateway", "-config", "/config/config.json"]
    environment:
      - HERMEX_GATEWAY_ADDR=:8080
      - HERMEX_BACKEND_MAPI=https://mapi:8080
      - HERMEX_BACKEND_EWS=https://ews:8080
      - HERMEX_BACKEND_ACTIVESYNC=https://activesync:8080
      - HERMEX_BACKEND_DAV=https://dav:8080
      - HERMEX_BACKEND_WEBMAIL=https://webmail:8080
      # acme-mode dev wiring (ignored in the default manual mode): CertMagic writes
      # its state to a dedicated writable dir, and trusts the local pebble test CA's
      # self-signed ACME endpoint. Production leaves HERMEX_ACME_CA_ROOT unset.
      - HERMEX_ACME_STORAGE=/data/acme
      - HERMEX_ACME_CA_ROOT=/pebble/minica.pem
    volumes:
      - ./docker-data/config.json:/config/config.json:ro
      - ./docker-data/mailboxes/tls:/data/mailboxes/tls:ro
      - ./docker-data/spill/gateway:/data/logspill
      - ./docker-data/gateway-acme:/data/acme
      - ./docker-data/pebble:/pebble:ro
    ports:
      - "8149:8080"
    networks:
      # In acme mode pebble validates TLS-ALPN-01 by connecting to each managed name
      # on the gateway, so the dev test domain resolves to this container.
      default:
        aliases:
          - mail.hermex.test
          - autodiscover.hermex.test
          - autoconfig.hermex.test
    depends_on:
      # The gateway only reads the directory for the optional TLS certificate store
      # and serves the config-file certificate until it is reachable, so it waits for
      # the db container to exist (DSN host resolves) but not for it to be healthy —
      # the front door must not be held hostage to the cert store at boot.
      db:
        condition: service_started
      mapi:
        condition: service_started
      ews:
        condition: service_started
      activesync:
        condition: service_started
      dav:
        condition: service_started
      webmail:
        condition: service_started
    restart: unless-stopped

  # Pebble: a small ACME test CA (https://github.com/letsencrypt/pebble) for
  # exercising acme mode offline — the real Let's Encrypt needs a public :443 and a
  # real domain, which the dev env cannot provide. Internal-only (ACME on :14000,
  # management on :15000); the gateway reaches it as pebble:14000 and validates
  # TLS-ALPN-01 against itself on :8080 (tlsPort in the config). Not part of the mail
  # path — only used when TLS mode is set to acme with the pebble directory URL.
  pebble:
    container_name: hermex-pebble
    image: ghcr.io/letsencrypt/pebble:2.10.1
    command: ["-config", "/test/config/pebble-config.json"]
    environment:
      - PEBBLE_VA_NOSLEEP=1
    volumes:
      - ./docker/pebble/pebble-config.json:/test/config/pebble-config.json:ro
    restart: unless-stopped

  # Fetch-worker: polls configured remote POP3/IMAP accounts and delivers their new
  # mail into local mailboxes. Outbound-only — it binds no port. A single instance must
  # run this loop (two would double-fetch), so it is its own always-on daemon.
  fetchmail:
    container_name: hermex-fetchmail
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["/usr/local/bin/hermex-fetchmail", "-config", "/config/config.json"]
    volumes:
      - ./docker-data/mailboxes:/data/mailboxes
      - ./docker-data/config.json:/config/config.json:ro
      - ./docker-data/spill/fetchmail:/data/logspill
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
