name: hermex

# Single compose file for hermEX. The whole project is in active development, so
# there is ONE environment and ONE MariaDB (db), no profiles: the Go toolchain
# (dev) and the runnable mail server (mta/pop3/imap/webmail) all come up together
# with `docker compose up -d`. Tests use a SEPARATE database (hermex_test) on the
# same db container — created on demand by the test harness — so the suite never
# disturbs the runtime accounts in the 'email' database. Every persistent volume
# is a docker-data/ bind mount; there are no Docker named volumes.
services:
  db:
    container_name: hermex-db
    image: mariadb:11
    environment:
      - MARIADB_ROOT_PASSWORD=hermexstack
      - MARIADB_DATABASE=email
    volumes:
      - ./docker-data/db:/var/lib/mysql
    ports:
      - "8142:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  dev:
    container_name: hermex-dev
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    working_dir: /src
    volumes:
      - .:/src
      - ./docker-data/cache/go-build:/root/.cache/go-build
      - ./docker-data/cache/go-mod:/go/pkg/mod
      - ./docker-data:/data
    environment:
      - HERMEX_DATA_DIR=/data
      - HERMEX_TEST_MYSQL_DSN=root:hermexstack@tcp(db:3306)/hermex_test?charset=utf8mb4
    depends_on:
      db:
        condition: service_healthy
    command: sleep infinity

  mta:
    container_name: hermex-mta
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["/usr/local/bin/hermex-mta", "-config", "/config/config.json"]
    volumes:
      - ./docker-data/mailboxes:/data/mailboxes
      - ./docker-data/config.json:/config/config.json:ro
    ports:
      - "8140:25"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  pop3:
    container_name: hermex-pop3
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["/usr/local/bin/hermex-pop3", "-config", "/config/config.json"]
    volumes:
      - ./docker-data/mailboxes:/data/mailboxes
      - ./docker-data/config.json:/config/config.json:ro
    ports:
      - "8141:110"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  imap:
    container_name: hermex-imap
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["/usr/local/bin/hermex-imap", "-config", "/config/config.json"]
    volumes:
      - ./docker-data/mailboxes:/data/mailboxes
      - ./docker-data/config.json:/config/config.json:ro
    ports:
      - "8143:143"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  webmail:
    container_name: hermex-webmail
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["/usr/local/bin/hermex-webmail", "-config", "/config/config.json"]
    volumes:
      - ./docker-data/mailboxes:/data/mailboxes
      - ./docker-data/config.json:/config/config.json:ro
    ports:
      - "8144:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  dav:
    container_name: hermex-dav
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["/usr/local/bin/hermex-dav", "-config", "/config/config.json"]
    volumes:
      - ./docker-data/mailboxes:/data/mailboxes
      - ./docker-data/config.json:/config/config.json:ro
    ports:
      - "8145:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
