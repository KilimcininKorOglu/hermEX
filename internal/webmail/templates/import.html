{{define "import"}}{{template "head" .}}
<div class="reader">
  <div class="reader-toolbar"><a href="/mail?folder=INBOX">&larr; Back to mailbox</a></div>
  <div class="compose-card">
    <h2>Import message</h2>
    {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
    <form method="post" action="/import" enctype="multipart/form-data">
      <div class="field">
        <label>Destination folder</label>
        <select name="folder">
          {{range .Folders}}<option value="{{.Path}}">{{.Path}}</option>{{end}}
        </select>
      </div>
      <div class="field">
        <label>Email file (.eml)</label>
        <input type="file" name="eml" accept=".eml,message/rfc822" required>
      </div>
      <div class="compose-actions">
        <button class="primary" type="submit">Import</button>
      </div>
    </form>
  </div>
</div>
{{template "foot" .}}{{end}}
