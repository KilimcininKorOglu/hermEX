{{define "sharing"}}{{template "head" .}}
<div class="reader">
  <div class="reader-toolbar"><a href="/mail?folder=INBOX">&larr; Back to mailbox</a></div>
  <h2>Folder sharing</h2>
  <form method="get" action="/sharing" class="sharing-pick">
    <label>Folder</label>
    <select name="folder" onchange="this.form.submit()">
      <option value="">Choose a folder&hellip;</option>
      {{range .Folders}}<option value="{{.Path}}"{{if eq .Path $.Folder}} selected{{end}}>{{.Path}}</option>{{end}}
    </select>
    <noscript><button type="submit">Show</button></noscript>
  </form>
  {{if .Folder}}
  <table class="sharing-table">
    <thead><tr><th>Who</th><th>Permission level</th></tr></thead>
    <tbody>
      {{range .Rows}}
      <tr><td>{{if .Special}}<em>{{.Name}} (default access)</em>{{else}}{{.Name}}{{end}}</td><td>{{.Level}}</td></tr>
      {{else}}
      <tr><td colspan="2" class="muted">No one else has access to this folder.</td></tr>
      {{end}}
    </tbody>
  </table>
  {{end}}
</div>
{{template "foot" .}}{{end}}
