{{define "compose"}}{{template "head" .}}
<div class="reader">
  <div class="reader-toolbar"><a href="/mail?folder=INBOX">&larr; Back to mailbox</a></div>
  <div class="compose-card">
    <h2>{{if .Title}}{{.Title}}{{else}}New message{{end}}</h2>
    {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
    {{if .Notice}}<p class="notice">{{.Notice}}</p>{{end}}
    <form method="post" action="/compose">
      <input type="hidden" name="inreplyto" value="{{.InReplyTo}}">
      <input type="hidden" name="references" value="{{.References}}">
      <input type="hidden" name="attachfolder" value="{{.AttachFolder}}">
      <input type="hidden" name="attachuid" value="{{.AttachUID}}">
      <div class="field">
        <label>From</label>
        <select name="from">
          {{range .FromOptions}}<option value="{{.}}"{{if eq . $.From}} selected{{end}}>{{.}}</option>{{end}}
        </select>
      </div>
      <div class="field">
        <label>To</label>
        <input name="to" value="{{.To}}" placeholder="user@example.com, other@example.com" autofocus>
      </div>
      <div class="field">
        <label>Cc</label>
        <input name="cc" value="{{.Cc}}" placeholder="cc@example.com">
      </div>
      <div class="field">
        <label>Bcc</label>
        <input name="bcc" value="{{.Bcc}}" placeholder="bcc@example.com">
      </div>
      <div class="field">
        <label>Subject</label>
        <input name="subject" value="{{.Subject}}">
      </div>
      <div class="field options">
        <label>Importance</label>
        <select name="importance">
          <option value=""{{if eq .Importance ""}} selected{{end}}>Normal</option>
          <option value="high"{{if eq .Importance "high"}} selected{{end}}>High</option>
          <option value="low"{{if eq .Importance "low"}} selected{{end}}>Low</option>
        </select>
        <label>Sensitivity</label>
        <select name="sensitivity">
          <option value=""{{if eq .Sensitivity ""}} selected{{end}}>Normal</option>
          <option value="personal"{{if eq .Sensitivity "personal"}} selected{{end}}>Personal</option>
          <option value="private"{{if eq .Sensitivity "private"}} selected{{end}}>Private</option>
          <option value="confidential"{{if eq .Sensitivity "confidential"}} selected{{end}}>Confidential</option>
        </select>
        <label class="check"><input type="checkbox" name="readreceipt" value="1"{{if .ReadReceipt}} checked{{end}}> Request read receipt</label>
      </div>
      <div class="field">
        <label>Message</label>
        <textarea name="body" rows="14">{{.Body}}</textarea>
      </div>
      <button class="primary" type="submit">Send</button>
    </form>
  </div>
</div>
{{template "foot" .}}{{end}}
