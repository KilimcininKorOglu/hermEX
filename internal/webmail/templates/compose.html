{{define "compose"}}{{template "head" .}}
{{template "editor-assets" .}}
<div class="reader">
  <div class="reader-toolbar"><a href="/mail?folder=INBOX">&larr; Back to mailbox</a></div>
  <div class="compose-card">
    <h2>{{if .Title}}{{.Title}}{{else}}New message{{end}}</h2>
    {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
    {{if .Notice}}<p class="notice">{{.Notice}}</p>{{end}}
    <form method="post" action="/compose" id="composeform">
      <input type="hidden" name="inreplyto" value="{{.InReplyTo}}">
      <input type="hidden" name="references" value="{{.References}}">
      <input type="hidden" name="attachfolder" value="{{.AttachFolder}}">
      <input type="hidden" name="attachuid" value="{{.AttachUID}}">
      <input type="hidden" name="draftfolder" value="{{.DraftFolder}}">
      <input type="hidden" name="draftuid" value="{{.DraftUID}}">
      <div class="field">
        <label>From</label>
        <select name="from">
          {{range .FromOptions}}<option value="{{.}}"{{if eq . $.From}} selected{{end}}>{{.}}</option>{{end}}
        </select>
      </div>
      <div class="field">
        <label>To</label>
        <input name="to" value="{{.To}}" placeholder="user@example.com, other@example.com" autofocus>
      </div>
      <div class="field">
        <label>Cc</label>
        <input name="cc" value="{{.Cc}}" placeholder="cc@example.com">
      </div>
      <div class="field">
        <label>Bcc</label>
        <input name="bcc" value="{{.Bcc}}" placeholder="bcc@example.com">
      </div>
      <div class="field">
        <label>Subject</label>
        <input name="subject" value="{{.Subject}}">
      </div>
      <div class="field options">
        <label>Importance</label>
        <select name="importance">
          <option value=""{{if eq .Importance ""}} selected{{end}}>Normal</option>
          <option value="high"{{if eq .Importance "high"}} selected{{end}}>High</option>
          <option value="low"{{if eq .Importance "low"}} selected{{end}}>Low</option>
        </select>
        <label>Sensitivity</label>
        <select name="sensitivity">
          <option value=""{{if eq .Sensitivity ""}} selected{{end}}>Normal</option>
          <option value="personal"{{if eq .Sensitivity "personal"}} selected{{end}}>Personal</option>
          <option value="private"{{if eq .Sensitivity "private"}} selected{{end}}>Private</option>
          <option value="confidential"{{if eq .Sensitivity "confidential"}} selected{{end}}>Confidential</option>
        </select>
        <label class="check"><input type="checkbox" name="readreceipt" value="1"{{if .ReadReceipt}} checked{{end}}> Request read receipt</label>
      </div>
      <div class="field">
        <label>Message</label>
        <div class="compose-format">
          <label class="check"><input type="radio" name="formatchoice" value="plain"> Plain text</label>
          <label class="check"><input type="radio" name="formatchoice" value="html"> HTML</label>
        </div>
        <textarea name="body" id="plainbody" rows="14">{{.Body}}</textarea>
        <div id="htmleditor" style="display:none"><div id="editor"></div></div>
        <input type="hidden" name="format" id="formatfield" value="{{.Format}}">
        <textarea name="bodyhtml" id="bodyhtmlfield" style="display:none">{{.BodyHTML}}</textarea>
      </div>
      <div class="compose-actions">
        <button class="primary" type="submit" name="action" value="send">Send</button>
        <button type="submit" name="action" value="savedraft" formnovalidate>Save draft</button>
        <span class="sendlater">
          <input type="datetime-local" name="sendat" aria-label="Send at">
          <button type="submit" name="action" value="sendlater">Send later</button>
        </span>
      </div>
    </form>
  </div>
</div>
<script>
(function () {
  if (typeof Quill === "undefined") { return; } // no editor: the plain textarea posts as-is
  var form = document.getElementById("composeform");
  var plain = document.getElementById("plainbody");
  var box = document.getElementById("htmleditor");
  var fmt = document.getElementById("formatfield");
  var htmlField = document.getElementById("bodyhtmlfield");
  if (!form || !plain || !box || !fmt || !htmlField) { return; }

  var quill = new Quill("#editor", {
    theme: "snow",
    modules: { toolbar: [
      [{ header: [1, 2, 3, false] }],
      ["bold", "italic", "underline", "strike"],
      [{ color: [] }, { background: [] }],
      [{ list: "ordered" }, { list: "bullet" }],
      ["blockquote", "link"],
      ["clean"]
    ] }
  });

  function radios() { return form.querySelectorAll("input[name=formatchoice]"); }
  function setMode(html) {
    box.style.display = html ? "" : "none";
    plain.style.display = html ? "none" : "";
    fmt.value = html ? "html" : "plain";
    radios().forEach(function (r) { r.checked = (r.value === (html ? "html" : "plain")); });
  }

  // Seed the editor from any carried HTML: the user's own draft on an error
  // re-render, or a signature. This is user-trusted content (reply/forward
  // quoting is inserted as escaped plain text, never raw original markup).
  if (htmlField.value.trim()) { quill.clipboard.dangerouslyPasteHTML(htmlField.value); }

  var startHTML = fmt.value === "html";
  if (startHTML && !htmlField.value.trim() && plain.value.trim()) { quill.setText(plain.value); }
  setMode(startHTML);

  radios().forEach(function (r) {
    r.addEventListener("change", function () {
      if (r.value === "html") {
        if (!quill.getText().trim() && plain.value.trim()) { quill.setText(plain.value); }
        setMode(true);
      } else {
        plain.value = quill.getText().replace(/\n+$/, "");
        setMode(false);
      }
    });
  });

  // captureBody syncs the editor content into the hidden fields the server
  // reads: in HTML mode the semantic HTML plus its plain rendering (the
  // text/plain alternative); in plain mode the textarea already holds the text.
  function captureBody() {
    if (fmt.value === "html") {
      htmlField.value = quill.getSemanticHTML();
      plain.value = quill.getText().replace(/\n+$/, "");
    } else {
      htmlField.value = "";
    }
  }

  var draftuid = form.querySelector("input[name=draftuid]");
  var sending = false, saving = false, timer = null;

  form.addEventListener("submit", function () {
    sending = true; // a real send/save must not race a pending autosave
    if (timer) { clearTimeout(timer); }
    captureBody();
  });

  // Autosave: after a typing pause (or when the window loses focus) the draft is
  // filed in the background and the hidden draft uid is updated from the reply,
  // so the next autosave replaces the same draft instead of accumulating copies.
  // It is skipped while the compose is empty (no junk drafts) and while a send is
  // in flight. With JS off, the manual "Save draft" button is the fallback.
  function bodyText() { return fmt.value === "html" ? quill.getText().trim() : plain.value.trim(); }
  function isEmpty() {
    return !form.subject.value.trim() && !bodyText() &&
      !form.to.value.trim() && !form.cc.value.trim() && !form.bcc.value.trim();
  }
  function autosave() {
    timer = null;
    if (sending || saving || isEmpty()) { return; }
    captureBody();
    saving = true;
    var data = new URLSearchParams(new FormData(form));
    data.set("action", "savedraft");
    fetch(form.getAttribute("action"), {
      method: "POST",
      headers: { "Accept": "application/json", "Content-Type": "application/x-www-form-urlencoded" },
      body: data.toString(),
      credentials: "same-origin"
    }).then(function (r) { return r.ok ? r.json() : null; })
      .then(function (j) { if (j && j.draftUid && draftuid) { draftuid.value = j.draftUid; } })
      .catch(function () {})
      .then(function () { saving = false; });
  }
  function schedule() {
    if (sending) { return; }
    if (timer) { clearTimeout(timer); }
    timer = setTimeout(autosave, 10000);
  }

  // Wired after the initial seeding above, so prefilling a draft/signature does
  // not itself trigger an autosave (which would churn the uid on mere opening).
  quill.on("text-change", schedule);
  ["to", "cc", "bcc", "subject"].forEach(function (n) {
    if (form[n]) { form[n].addEventListener("input", schedule); }
  });
  plain.addEventListener("input", schedule);
  window.addEventListener("blur", function () { if (timer) { clearTimeout(timer); } autosave(); });
})();
</script>
{{template "foot" .}}{{end}}
