{{define "addressbook"}}{{template "head" .}}
<div class="reader">
  <div class="reader-toolbar"><a href="/mail?folder=INBOX">&larr; Back to mailbox</a></div>
  <h2>Address book</h2>
  <form method="get" action="/addressbook" class="addressbook-search">
    <input type="search" name="q" value="{{.Query}}" placeholder="Search the directory by name or address" autofocus>
    <button type="submit">Search</button>
  </form>
  {{if .Query}}
  <table class="addressbook-table">
    <thead><tr><th>Name</th><th>Address</th><th></th></tr></thead>
    <tbody>
      {{range .Entries}}
      <tr>
        <td>{{.Display}}</td>
        <td>{{.Address}}</td>
        <td><a href="/compose?to={{.Address}}">Compose</a></td>
      </tr>
      {{else}}
      <tr><td colspan="3" class="muted">No directory entries match &ldquo;{{.Query}}&rdquo;.</td></tr>
      {{end}}
    </tbody>
  </table>
  {{end}}
</div>
{{template "foot" .}}{{end}}
