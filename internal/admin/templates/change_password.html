{{define "change_password.html"}}{{template "head" .}}
<div class="layout">
{{template "sidebar" .}}
<main>
<h1>Change password</h1>
<p class="hint">Change the password for your own account ({{.Login}}). Your current password is required.</p>
<form class="edit-form" hx-put="/admin/ui/change-password" hx-target="#cp-result" hx-swap="innerHTML"
      hx-headers='{"X-CSRF-Token": "{{.CSRF}}"}'>
<label>Current password <input type="password" name="old" autocomplete="current-password" required></label>
<label>New password <input type="password" name="new" autocomplete="new-password" required></label>
<button type="submit">Change password</button>
</form>
<div id="cp-result"></div>
</main>
</div>
{{template "foot" .}}{{end}}

{{define "change-password-result"}}<p class="{{if .OK}}success{{else}}error{{end}}">{{.Message}}</p>{{end}}
