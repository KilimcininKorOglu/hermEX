name: hermex-stack

# Runnable thin mail vertical: SMTP intake + POP3 retrieval, backed by a MariaDB
# account/domain directory and per-mailbox stores on a shared volume. Host ports
# come from the project's 8140-8149 block (8140->25 SMTP, 8141->110 POP3,
# 8142->3306 directory DB); see ~/.claude/docker-ports.md.
services:
  db:
    container_name: hermex-db
    image: mariadb:11
    environment:
      - MARIADB_ROOT_PASSWORD=hermexstack
      - MARIADB_DATABASE=email
    volumes:
      - hermex-stack-mariadb:/var/lib/mysql
    ports:
      - "8142:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  mta:
    container_name: hermex-mta
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["/usr/local/bin/hermex-mta", "-config", "/config/config.json"]
    volumes:
      - ./docker-data/mailboxes:/data/mailboxes
      - ./docker-data/config.json:/config/config.json:ro
    ports:
      - "8140:25"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  pop3:
    container_name: hermex-pop3
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["/usr/local/bin/hermex-pop3", "-config", "/config/config.json"]
    volumes:
      - ./docker-data/mailboxes:/data/mailboxes
      - ./docker-data/config.json:/config/config.json:ro
    ports:
      - "8141:110"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  hermex-stack-mariadb:
