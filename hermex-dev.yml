name: hermex

# Development environment for hermEX. The dev container holds the Go toolchain;
# a MariaDB service backs the directory integration tests. Every persistent
# volume is a bind mount under docker-data/ (no Docker named volumes).
services:
  dev:
    container_name: hermex-dev
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    working_dir: /src
    volumes:
      - .:/src
      - ./docker-data/cache/go-build:/root/.cache/go-build
      - ./docker-data/cache/go-mod:/go/pkg/mod
      - ./docker-data:/data
    environment:
      - HERMEX_DATA_DIR=/data
      - HERMEX_TEST_MYSQL_DSN=root:hermexdev@tcp(db:3306)/email?charset=utf8mb4
    depends_on:
      db:
        condition: service_healthy
    command: sleep infinity

  db:
    container_name: hermex-dev-db
    image: mariadb:11
    environment:
      - MARIADB_ROOT_PASSWORD=hermexdev
      - MARIADB_DATABASE=email
    volumes:
      - ./docker-data/dev-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
